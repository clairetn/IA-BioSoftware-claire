name: Python CI 🚀

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

jobs:
  setup:
    name: 🛠️ Setup
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev build-essential

      - name: 📦 Install dependencies from pyproject.toml
        run: |
          python -m pip install --upgrade pip
          pip install .

  ruff:
    name: 🧐 Ruff Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Ruff
        run: python -m pip install ruff

      - name: 🔍 Run Ruff Lint
        run: ruff check . --force-exclude --exclude developpement_logiciel/burger.py

      - name: 📝 Run Ruff Format Check
        run: ruff format --check . --force-exclude --exclude developpement_logiciel/burger.py

